name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout gh-pages 🛎️
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: build

      - name: Build and Push 🚀
        run: |
          bash ./build.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PUSH: "true"
