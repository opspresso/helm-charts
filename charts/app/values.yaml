# Default values for sample.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Chart Identity
nameOverride: ""
  # nameOverride: "my-app"
fullnameOverride: ""
  # fullnameOverride: "my-app-fullname"
namespaceOverride: ""

# -- Controller (Deployment / Rollout)
replicaCount: 1

revisionHistoryLimit: 3

controller:
  kind: Deployment # Deployment or Rollout

  strategy:
    type: RollingUpdate # RollingUpdate or BlueGreen or Canary
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
    blueGreen:
      autoPromotionEnabled: true
      autoPromotionSeconds: 60
    canary:
      steps: []
      # - setWeight: 10
      # - pause:
      #     duration: 60
      # - setWeight: 50
      # - pause:
      #     duration: 60

# -- Container Image
image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart version.
  tag: ""

imagePullSecrets: []
  # - name: my-registry-secret

# -- Container Spec
command: []
  # - "aws"
  # - "s3"
  # - "ls"

args: []
  # - --host
  # - 0.0.0.0

env: []
  # - name: MESSAGE
  #   value: "hello world"

extraPorts: []
  # - name: metrics
  #   containerPort: 9090
  #   protocol: TCP

livenessProbe: {}
  # httpGet:
  #   path: /
  #   port: 3000
  # initialDelaySeconds: 3
  # periodSeconds: 10
  # failureThreshold: 3

readinessProbe: {}
  # httpGet:
  #   path: /
  #   port: 3000
  # initialDelaySeconds: 3
  # periodSeconds: 10
  # failureThreshold: 3

startupProbe: {}
  # httpGet:
  #   path: /
  #   port: 3000
  # initialDelaySeconds: 0
  # periodSeconds: 10
  # failureThreshold: 30

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 100m
  #   memory: 128Mi

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

lifecycle: {}
  # preStop:
  #   exec:
  #     command: ["/bin/sh", "-c", "sleep 15"]
  # postStart:
  #   exec:
  #     command: ["/bin/sh", "-c", "echo started"]

# -- Init & Sidecar Containers
initContainers: []
  # - name: init-data
  #   image: busybox
  #   command: ["sh", "-c", "echo init"]

sidecars: []
  # - name: log-shipper
  #   image: fluentd:latest
  #   volumeMounts:
  #     - name: logs
  #       mountPath: /var/log

# -- Pod Metadata & Spec
additionalLabels: {}
  # team: backend
  # environment: production

podLabels: {}
  # app.kubernetes.io/component: api

podAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "9090"

podSecurityContext: {}
  # runAsUser: 1000
  # runAsGroup: 3000
  # fsGroup: 2000

dnsPolicy: ClusterFirst # ClusterFirst, Default

restartPolicy: Always # Always, OnFailure, Never

terminationGracePeriodSeconds: 30

# -- Storage
persistence:
  enabled: false
  # storageClassName: default
  accessModes:
  - ReadWriteOnce
  size: 10Gi
  # existingClaim: ""
  mountPath: "/data"
  # subPath: ""

extraVolumes: []
  # - name: extras
  #   emptyDir: {}

extraVolumeMounts: []
  # - name: extras
  #   mountPath: /usr/share/extras
  #   readOnly: true

# -- Scheduling
nodeSelector: {}
  # kubernetes.io/os: linux
  # node.kubernetes.io/instance-type: m5.large

tolerations: []
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "app"
  #   effect: "NoSchedule"

affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #       - matchExpressions:
  #           - key: topology.kubernetes.io/zone
  #             operator: In
  #             values:
  #               - ap-northeast-2a
  #               - ap-northeast-2c

podAntiAffinity: {}
  # topologyKey: "topology.kubernetes.io/zone"

topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: my-app

# -- ServiceAccount, RBAC & IAM
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  create: false
  rules: []
    # - apiGroups:
    #     - ""
    #   resources:
    #     - "*"
    #   verbs:
    #     - "*"

irsa:
  enabled: false
  # roleArn: "arn:aws:iam::123456789012:role/my-app-role"
  roleArn: ""

# -- Service & Networking
service:
  type: ClusterIP
  name: http
  protocol: TCP
  targetPort: 3000
  port: 80
  # Annotations to add to the service
  annotations: {}
    # service.kubernetes.io/topology-aware-hints: auto

routing:
  hosts:
    - sample.domain.com
  path: /
  pathType: Prefix

  ingress:                    # deprecated
    enabled: false
    className: ""
    annotations: {}
      # cert-manager.io/cluster-issuer: "letsencrypt-issuer"
      # kubernetes.io/ingress.class: "nginx"
      # kubernetes.io/ssl-redirect: "true"
    tls: []
    #  - secretName: sample-tls
    #    hosts:
    #      - sample.domain.com

  istio:
    enabled: false
    annotations: {}
    gateway:
      selector:
        istio: default-ingress-gateway

  httpRoute:
    enabled: false
    annotations: {}
    parentRefs:
      - name: infra-gateway
        namespace: istio-system

  backendTLSPolicy:
    enabled: false
    annotations: {}
    targetRefs:
      - kind: Service
        name: http
        port: 80
    validation:
      trust:
        secret:
          name: backend-tls-secret

# -- Scaling & Availability
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 6
  behavior: {}
    # scaleDown:
    #   policies:
    #     - periodSeconds: 60
    #       type: Percent
    #       value: 25
    #   stabilizationWindowSeconds: 600
  metrics: []
    # - type: Resource
    #   resource:
    #     name: cpu
    #     target:
    #       type: Utilization
    #       averageUtilization: 60
    # - type: ContainerResource
    #   containerResource:
    #     name: cpu
    #     container: app
    #     target:
    #       type: Utilization
    #       averageUtilization: 60

pdb:
  enabled: false
  # maxUnavailable: 1   # default if neither maxUnavailable nor minAvailable is set
  # minAvailable: 1

# -- Configuration & Secrets
configmap:
  enabled: false
  data: {}
    # MESSAGE: "hello world"

secret:
  enabled: false
  data: {}
    # SECRET_MESSAGE: "c2VjcmV0IG1lc3NhZ2U="

additionalConfigmap:
  enabled: false
  names: []
    # - "additional-configmap"

additionalSecret:
  enabled: false
  names: []
    # - "additional-secret"

externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: parameter-store
  data: []
    # - key: /k8s/common/demo
    #   name: admin-password
    #   property: demo/admin-password

# -- Monitoring
serviceMonitor:
  enabled: false
  labels:
    release: prometheus-operator
  endpoints:
  - interval: 10s
    path: /metrics
    port: http
