{{- if eq .Values.type "CronWorkflow" }}
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  {{- with .Values.cronWorkflow.timezone }}
  timezone: {{ . | quote }}
  {{- end }}
  {{- if .Values.cronWorkflow.suspend }}
  suspend: true
  {{- end }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit | default "3" }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit | default "3" }}
  workflowSpec:
    entrypoint: cron
    serviceAccountName: {{ include "app.serviceAccountName" . }}
    {{- if .Values.activeDeadlineSeconds }}
    activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
    {{- end }}
    ttlStrategy:
      secondsAfterSuccess: {{ .Values.cronWorkflow.ttlSecondsAfterSuccess | default 180 }}
      secondsAfterFailure: {{ .Values.cronWorkflow.ttlSecondsAfterFailure | default 180 }}
    {{- if .Values.cronWorkflow.hostNetwork }}
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    {{- else }}
    dnsPolicy: ClusterFirst
    {{- end }}
    {{- if .Values.cronWorkflow.hooks.enabled }}
    hooks:
      {{- if .Values.cronWorkflow.hooks.running }}
      running:
        expression: 'workflow.status == "Running"'
        template: hook
      {{- end }}
      {{- if .Values.cronWorkflow.hooks.succeeded }}
      succeeded:
        expression: 'workflow.status == "Succeeded"'
        template: hook
      {{- end }}
      {{- if .Values.cronWorkflow.hooks.failed }}
      failed:
        expression: 'workflow.status == "Failed"'
        template: hook
      {{- end }}
      {{- if .Values.cronWorkflow.hooks.pending }}
      pending:
        expression: 'workflow.status == "Pending"'
        template: hook
      {{- end }}
    {{- end }}
    templates:
    - name: cron
      steps:
      - - name: main
          template: main
    - name: main
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cronWorkflow.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      metadata:
        annotations:
          sidecar.istio.io/inject: "false"
          {{- with .Values.cronWorkflow.podAnnotations }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        labels:
          {{- include "app.podLabels" . | nindent 10 }}
          {{- with .Values.cronWorkflow.podLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      container:
        name: job
        image: {{ include "app.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
        {{- with .Values.command }}
        command:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.env }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if or .Values.configmap.enabled .Values.secret.enabled .Values.externalSecrets.enabled .Values.additionalConfigmap.enabled .Values.additionalSecret.enabled .Values.cronWorkflow.configs }}
        envFrom:
          {{- if .Values.configmap.enabled }}
          - configMapRef:
              name: {{ include "app.fullname" . }}
          {{- end }}
          {{- if .Values.secret.enabled }}
          - secretRef:
              name: {{ include "app.fullname" . }}
          {{- end }}
          {{- if .Values.externalSecrets.enabled }}
          - secretRef:
              name: {{ include "app.fullname" . }}-external
          {{- end }}
          {{- if .Values.additionalConfigmap.enabled }}
          {{- range .Values.additionalConfigmap.names }}
          - configMapRef:
              name: {{ . }}
          {{- end }}
          {{- end }}
          {{- if .Values.additionalSecret.enabled }}
          {{- range .Values.additionalSecret.names }}
          - secretRef:
              name: {{ . }}
          {{- end }}
          {{- end }}
          {{- range .Values.cronWorkflow.configs }}
          - secretRef:
              name: {{ . }}
          {{- end }}
        {{- end }}
        {{- with .Values.cronWorkflow.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- if .Values.cronWorkflow.hooks.enabled }}
    - name: hook
      {{- with .Values.cronWorkflow.hooks.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cronWorkflow.hooks.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      metadata:
        annotations:
          sidecar.istio.io/inject: "false"
        labels:
          {{- include "app.podLabels" . | nindent 10 }}
      script:
        name: send-event-hook
        image: {{ .Values.cronWorkflow.hooks.image | default "314695318048.dkr.ecr.ap-northeast-2.amazonaws.com/daangn/kontrol-runner:latest" }}
        command: [bash]
        resources: {}
        source: |
          set -e
          PAYLOAD='{{ .Values.cronWorkflow.hooks.payload | default "{}" }}'
          PAYLOAD=$(echo "$PAYLOAD" | jq -cM '.detail.status = (.detail.status | ascii_upcase)')
          curl --retry 5 --retry-all-errors {{ if .Values.cronWorkflow.hooks.verbose }}-v -i{{ end }} -w '\n' -X POST -H "Content-Type: application/json" \
          {{ .Values.cronWorkflow.hooks.url | default "${KONTROL_URL}/api/argo-workflows/events" }} -d $PAYLOAD
    {{- end }}
{{- end }}
